```html
{% extends "base.html" %}

{% block title %}
    Login
{% endblock %}

{% block content %}

<div class="card">
    <h1 style="margin-bottom:20px;">
        Login
    </h1>

    <form method="post">
        {% csrf_token %}

        {{ form.non_field_errors }}

        <div>
            <label>Username</label>
            {{ form.username }}
        </div>

        <div>
            <label>Password</label>
            {{ form.password }}
        </div>

        <button type="submit">
            Login
        </button>
    </form>
</div>

{% endblock %}
```
